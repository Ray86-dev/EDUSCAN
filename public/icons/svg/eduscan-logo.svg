<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a8266"/>
      <stop offset="100%" stop-color="#3a5440"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Magnifying glass body -->
  <circle cx="21" cy="21" r="9" fill="none" stroke="#c8dac0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27.5" y1="27.5" x2="35" y2="35" stroke="#c8dac0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Checkmark inside lens -->
  <polyline points="16,21 19.5,24.5 26,18" fill="none" stroke="#e8f0e4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small sparkle -->
  <circle cx="36" cy="12" r="1.5" fill="#c8dac0" opacity="0.8"/>
  <line x1="36" y1="8.5" x2="36" y2="15.5" stroke="#c8dac0" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="32.5" y1="12" x2="39.5" y2="12" stroke="#c8dac0" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
