<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Grid/rubric frame -->
  <rect x="3" y="3" width="18" height="18" rx="2" stroke="#476550" stroke-width="1.5"/>
  <!-- Horizontal dividers -->
  <line x1="3" y1="9" x2="21" y2="9" stroke="#476550" stroke-width="1" opacity="0.4"/>
  <line x1="3" y1="15" x2="21" y2="15" stroke="#476550" stroke-width="1" opacity="0.4"/>
  <!-- Vertical divider -->
  <line x1="10" y1="3" x2="10" y2="21" stroke="#476550" stroke-width="1" opacity="0.4"/>
  <!-- Labels (CE codes) -->
  <text x="6.5" y="7.2" text-anchor="middle" font-family="system-ui" font-size="3" font-weight="600" fill="#476550">CE1</text>
  <text x="6.5" y="13.2" text-anchor="middle" font-family="system-ui" font-size="3" font-weight="600" fill="#476550">CE2</text>
  <text x="6.5" y="19.2" text-anchor="middle" font-family="system-ui" font-size="3" font-weight="600" fill="#476550">CE3</text>
  <!-- Progress bars -->
  <rect x="12" y="5.5" width="7" height="2.5" rx="1.25" fill="#c8dac0"/>
  <rect x="12" y="5.5" width="6" height="2.5" rx="1.25" fill="#476550" opacity="0.8"/>
  <rect x="12" y="11.5" width="7" height="2.5" rx="1.25" fill="#c8dac0"/>
  <rect x="12" y="11.5" width="4.5" height="2.5" rx="1.25" fill="#476550" opacity="0.8"/>
  <rect x="12" y="17.5" width="7" height="2.5" rx="1.25" fill="#c8dac0"/>
  <rect x="12" y="17.5" width="7" height="2.5" rx="1.25" fill="#476550" opacity="0.8"/>
</svg>
